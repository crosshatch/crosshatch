name: Docs
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: docs.crosshatch.dev
    steps:
      - uses: actions/checkout@v6
      - run: |
          git -c url.https://github.com/.insteadOf=git@github.com: submodule update --init --depth 1 konfik liminal
          git -c url.https://github.com/.insteadOf=git@github.com: -C liminal submodule update --init --depth 1 konfik
      - uses: ./konfik/.github/actions/configure_environment
        with:
          playwright: true
      - run: pnpm build
      - run: pnpm build
        working-directory: docs
      - id: deploy
        working-directory: docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm wrangler pages deploy dist --project-name=crosshatch-docs --branch=${{ github.ref_name }}
